landing_faq_items_0_question = '''什麼是 Video Download Helper？'''
landing_faq_items_0_answer = '''Video Download Helper 是一款瀏覽器擴充功能，可讓您直接從瀏覽器偵測並下載來自眾多網站的影片和音訊內容。'''
landing_faq_items_1_question = '''Video Download Helper 是免費的嗎？'''
landing_faq_items_1_answer = '''是的，並且將一直免費。您可以免費安裝和使用 Video Download Helper，沒有時間限制。免費版已可讓您從數千個網站下載影片，並使用所有核心功能。對大多數使用者來說，免費版對日常下載已綽綽有餘。如果您需要進階功能和無限下載，可以購買一次性進階版授權。'''
landing_faq_items_2_question = '''我可以在哪些瀏覽器上使用 Video Download Helper？'''
landing_faq_items_2_answer = '''Video Download Helper 適用於 Google Chrome、Firefox 和 Microsoft Edge。您可以直接從官方瀏覽器商店安裝。如果您擁有進階版授權，它將在所有瀏覽器中有效。'''
landing_faq_items_3_question = '''我可以下載哪些類型的影片？'''
landing_faq_items_3_answer = '''Video Download Helper 可偵測並下載大多數網路影片格式：標準 MP4 影片、串流格式（HLS、DASH）、數千個網站的內嵌影片以及音訊串流（MP3 等）。它支援社交媒體、教育網站、新聞網站、串流服務等眾多平台。當您造訪頁面時，擴充功能會自動偵測可用媒體。'''
landing_faq_items_4_question = '''Video Download Helper 安全嗎？'''
landing_faq_items_4_answer = '''我們努力讓 Video Download Helper 對使用者安全：在官方瀏覽器商店（Chrome Web Store、Firefox Add-ons）中提供，全球數百萬使用者使用，無間諜軟體，無資料轉售，定期更新和維護。Video Download Helper 已開發並受信任近 20 年。您的隱私和安全是我們的首要任務。'''
landing_faq_items_5_question = '''付費版包含什麼？'''
landing_faq_items_5_answer = '''進階版授權解鎖 Video Download Helper 的全部功能：移除轉換中的浮水印，支援無限高品質影片轉換，更快處理速度,進階下載功能，支援持續開發。如果您經常下載影片，授權很快就能回本。'''

