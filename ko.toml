landing_faq_items_0_question = '''Video DownloadHelper란?'''
landing_faq_items_0_answer = '''Video DownloadHelper는 많은 웹사이트에서 동영상과 오디오 콘텐츠를 브라우저에서 직접 감지하고 다운로드할 수 있게 해주는 브라우저 확장 프로그램입니다.'''
landing_faq_items_1_question = '''Video DownloadHelper는 무료인가요?'''
landing_faq_items_1_answer = '''네, 앞으로도 무료로 유지됩니다. Video DownloadHelper는 무료로, 시간 제한 없이 설치하고 사용할 수 있습니다. 무료 버전으로도 이미 수천 개의 웹사이트에서 동영상을 다운로드하고 모든 주요 기능을 사용할 수 있습니다. 대부분의 사용자에게 무료 버전은 일상적인 다운로드에 충분합니다. 고급 기능과 무제한 다운로드가 필요하시면 일회성 프리미엄 라이선스를 구매하실 수 있습니다.'''
landing_faq_items_2_question = '''Video DownloadHelper는 어떤 브라우저에서 사용할 수 있나요?'''
landing_faq_items_2_answer = '''Video DownloadHelper는 Google Chrome, Firefox, Microsoft Edge에서 이용 가능합니다. 공식 브라우저 스토어에서 직접 설치할 수 있습니다. 프리미엄 라이선스가 있는 경우 모든 브라우저에서 작동합니다.'''
landing_faq_items_3_question = '''어떤 종류의 동영상을 다운로드할 수 있나요?'''
landing_faq_items_3_answer = '''Video DownloadHelper는 표준 MP4 동영상, 스트리밍 형식(HLS, DASH), 수천 개 사이트의 내장 동영상, 오디오 스트림(MP3 등) 등 대부분의 웹 동영상 형식을 감지하고 다운로드합니다. 소셜 미디어, 교육 사이트, 뉴스 사이트, 스트리밍 서비스 등 다양한 플랫폼에서 작동합니다. 페이지를 방문하면 확장 프로그램이 사용 가능한 미디어를 자동으로 감지합니다.'''
landing_faq_items_4_question = '''Video DownloadHelper는 안전한가요?'''
landing_faq_items_4_answer = '''Video DownloadHelper를 사용자에게 안전하게 만들기 위해 노력하고 있습니다: 공식 브라우저 스토어(Chrome Web Store, Firefox Add-ons)에서 제공, 전 세계 수백만 명이 사용, 스파이웨어 없음, 데이터 재판매 없음, 정기적인 업데이트 및 유지보수. Video DownloadHelper는 20년 가까이 개발되고 신뢰받아 왔습니다. 사용자의 개인정보 보호와 보안은 최우선 사항입니다.'''
landing_faq_items_5_question = '''유료 버전에는 무엇이 포함되나요?'''
landing_faq_items_5_answer = '''프리미엄 라이선스로 Video DownloadHelper의 모든 기능을 잠금 해제하세요: 변환 시 워터마크 제거, 무제한 고품질 동영상 변환, 더 빠른 처리, 고급 다운로드 기능, 지속적인 개발 지원. 정기적으로 동영상을 다운로드하시면 라이선스 비용을 빠르게 회수할 수 있습니다.'''

