landing_faq_items_0_question = '''Qu'est-ce que Video Download Helper ?'''
landing_faq_items_0_answer = '''Video Download Helper est une extension de navigateur qui vous permet de détecter et télécharger du contenu vidéo et audio depuis de nombreux sites web, directement dans votre navigateur.'''
landing_faq_items_1_question = '''Video Download Helper est-il gratuit ?'''
landing_faq_items_1_answer = '''Oui, et il le restera. Vous pouvez installer et utiliser Video Download Helper gratuitement, sans limite de temps. La version gratuite vous permet déjà de télécharger des vidéos depuis des milliers de sites web et d'utiliser toutes les fonctionnalités principales. Pour la plupart des utilisateurs, la version gratuite est largement suffisante au quotidien. Si vous avez besoin de fonctionnalités avancées et de téléchargements illimités, vous pouvez acheter une licence Premium à paiement unique.'''
landing_faq_items_2_question = '''Sur quels navigateurs puis-je utiliser Video Download Helper ?'''
landing_faq_items_2_answer = '''Video Download Helper est disponible pour Google Chrome, Firefox et Microsoft Edge. Vous pouvez l'installer directement depuis les boutiques officielles des navigateurs. Si vous avez une licence Premium, celle-ci fonctionne sur tous les navigateurs.'''
landing_faq_items_3_question = '''Quels types de vidéos puis-je télécharger ?'''
landing_faq_items_3_answer = '''Video Download Helper détecte et télécharge la plupart des formats vidéo du web : vidéos MP4 standard, formats de streaming (HLS, DASH), vidéos intégrées sur des milliers de sites et flux audio (MP3 et autres). Cela fonctionne sur les réseaux sociaux, les sites éducatifs, les sites d'actualités, les services de streaming et bien d'autres plateformes. L'extension détecte automatiquement les médias disponibles lorsque vous visitez une page.'''
landing_faq_items_4_question = '''Video Download Helper est-il sûr ?'''
landing_faq_items_4_answer = '''Nous travaillons dur pour rendre Video Download Helper sûr pour nos utilisateurs : disponible sur les boutiques officielles (Chrome Web Store, Firefox Add-ons), utilisé par des millions de personnes dans le monde, aucun logiciel espion, aucune revente de données, mis à jour et maintenu régulièrement. Video Download Helper est développé et utilisé en toute confiance depuis près de 20 ans. Votre vie privée et votre sécurité sont une priorité.'''
landing_faq_items_5_question = '''Que comprend la version payante ?'''
landing_faq_items_5_answer = '''La licence Premium débloque toute la puissance de Video Download Helper : suppression du filigrane lors des conversions, conversions vidéo de haute qualité illimitées, traitement plus rapide, fonctionnalités de téléchargement avancées, soutien au développement continu. Si vous téléchargez régulièrement des vidéos, la licence est vite rentabilisée.'''

