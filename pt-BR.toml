landing_faq_items_0_question = '''O que é o Video Download Helper?'''
landing_faq_items_0_answer = '''O Video Download Helper é uma extensão de navegador que permite detectar e baixar conteúdo de vídeo e áudio de muitos sites diretamente do seu navegador.'''
landing_faq_items_1_question = '''O Video Download Helper é gratuito?'''
landing_faq_items_1_answer = '''Sim, e continuará sendo gratuito. Você pode instalar e usar o Video Download Helper sem custo, sem limite de tempo. A versão gratuita já permite baixar vídeos de milhares de sites e usar todos os recursos principais. Para a maioria dos usuários, a versão gratuita é mais do que suficiente para os downloads diários. Se precisar de recursos avançados e downloads ilimitados, você pode adquirir uma licença Premium com pagamento único.'''
landing_faq_items_2_question = '''Em quais navegadores posso usar o Video Download Helper?'''
landing_faq_items_2_answer = '''O Video Download Helper está disponível para Google Chrome, Firefox e Microsoft Edge. Você pode instalá-lo diretamente nas lojas oficiais dos navegadores. Se você tem uma licença Premium, ela funciona em todos os navegadores.'''
landing_faq_items_3_question = '''Que tipos de vídeos posso baixar?'''
landing_faq_items_3_answer = '''O Video Download Helper detecta e baixa a maioria dos formatos de vídeo web: vídeos MP4 padrão, formatos de streaming (HLS, DASH), vídeos incorporados em milhares de sites e fluxos de áudio (MP3 e outros). Funciona em redes sociais, sites educacionais, sites de notícias, serviços de streaming e muitas outras plataformas. A extensão detecta automaticamente as mídias disponíveis quando você visita uma página.'''
landing_faq_items_4_question = '''O Video Download Helper é seguro?'''
landing_faq_items_4_answer = '''Trabalhamos duro para tornar o Video Download Helper seguro para nossos usuários: disponível nas lojas oficiais (Chrome Web Store, Firefox Add-ons), usado por milhões de usuários em todo o mundo, sem spyware, sem revenda de dados, atualizado e mantido regularmente. O Video Download Helper é desenvolvido e confiável há quase 20 anos. Sua privacidade e segurança são uma prioridade.'''
landing_faq_items_5_question = '''O que inclui a versão paga?'''
landing_faq_items_5_answer = '''A licença Premium desbloqueia todo o poder do Video Download Helper: remove a marca d'água das conversões, permite conversões de vídeo de alta qualidade ilimitadas, processamento mais rápido, recursos de download avançados, apoia o desenvolvimento contínuo. Se você baixa vídeos regularmente, a licença se paga rapidamente.'''

