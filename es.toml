landing_faq_items_0_question = "¿Qué es Video Download Helper?"
landing_faq_items_0_answer = "Video Download Helper es una extensión de navegador que le permite detectar y descargar contenido de video y audio de muchos sitios web directamente desde su navegador."
landing_faq_items_1_question = "¿Es Video Download Helper gratuito?"
landing_faq_items_1_answer = "Sí, y seguirá siendo gratuito. Puede instalar y usar Video Download Helper sin coste y sin límite de tiempo. La versión gratuita ya le permite descargar videos de miles de sitios web y usar todas las funciones principales. Para la mayoría de los usuarios, la versión gratuita es más que suficiente para las descargas diarias. Si necesita funciones avanzadas y descargas ilimitadas, puede adquirir una licencia Premium de pago único."
landing_faq_items_2_question = "¿En qué navegadores puedo usar Video Download Helper?"
landing_faq_items_2_answer = "Video Download Helper está disponible para Google Chrome, Firefox y Microsoft Edge. Puede instalarlo directamente desde las tiendas oficiales de los navegadores. Si tiene una licencia Premium, esta funciona en todos los navegadores."
landing_faq_items_3_question = "¿Qué tipos de videos puedo descargar?"
landing_faq_items_3_answer = "Video Download Helper detecta y descarga la mayoría de los formatos de video web: videos MP4 estándar, formatos de streaming (HLS, DASH), videos integrados en miles de sitios y flujos de audio (MP3 y otros). Funciona en redes sociales, sitios educativos, sitios de noticias, servicios de streaming y muchas otras plataformas. La extensión detecta automáticamente los medios disponibles cuando visita una página."
landing_faq_items_4_question = "¿Es seguro Video Download Helper?"
landing_faq_items_4_answer = "Trabajamos duro para que Video Download Helper sea seguro para nuestros usuarios: disponible en las tiendas oficiales de navegadores (Chrome Web Store, Firefox Add-ons), usado por millones de usuarios en todo el mundo, sin spyware, sin reventa de datos, actualizado y mantenido regularmente. Video Download Helper lleva casi 20 años desarrollándose y siendo de confianza. Su privacidad y seguridad son una prioridad."
landing_faq_items_5_question = "¿Qué incluye la versión de pago?"
landing_faq_items_5_answer = "La licencia Premium desbloquea toda la potencia de Video Download Helper: elimina la marca de agua de las conversiones, permite conversiones de video de alta calidad ilimitadas, procesamiento más rápido, funciones avanzadas de descarga, apoya el desarrollo continuo. Si descarga videos con frecuencia, la licencia se amortiza rápidamente."

