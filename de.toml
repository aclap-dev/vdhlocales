landing_faq_items_0_question = "Was ist Video Download Helper?"
landing_faq_items_0_answer = "Video Download Helper ist eine Browser-Erweiterung, mit der Sie Video- und Audioinhalte von vielen Websites direkt in Ihrem Browser erkennen und herunterladen können."
landing_faq_items_1_question = "Ist Video Download Helper kostenlos?"
landing_faq_items_1_answer = "Ja - und es wird kostenlos bleiben. Sie können Video Download Helper kostenlos und ohne zeitliche Begrenzung installieren und nutzen. Die kostenlose Version ermöglicht bereits das Herunterladen von Videos von Tausenden von Websites und die Nutzung aller Hauptfunktionen. Für die meisten Nutzer ist die kostenlose Version für den täglichen Gebrauch mehr als ausreichend. Wenn Sie erweiterte Funktionen und unbegrenzte Downloads benötigen, können Sie eine einmalige Premium-Lizenz erwerben."
landing_faq_items_2_question = "Mit welchen Browsern kann ich Video Download Helper nutzen?"
landing_faq_items_2_answer = "Video Download Helper ist für Google Chrome, Firefox und Microsoft Edge verfügbar. Sie können es direkt aus den offiziellen Browser-Stores installieren. Wenn Sie eine Premium-Lizenz haben, funktioniert diese in allen Browsern."
landing_faq_items_3_question = "Welche Arten von Videos kann ich herunterladen?"
landing_faq_items_3_answer = "Video Download Helper erkennt und lädt die meisten Web-Videoformate herunter: Standard-MP4-Videos, Streaming-Formate (HLS, DASH), eingebettete Videos auf Tausenden von Websites und Audio-Streams (MP3 und andere). Es funktioniert auf sozialen Netzwerken, Bildungsseiten, Nachrichtenseiten, Streaming-Diensten und vielen weiteren Plattformen. Die Erweiterung erkennt verfügbare Medien automatisch, wenn Sie eine Seite besuchen."
landing_faq_items_4_question = "Ist Video Download Helper sicher?"
landing_faq_items_4_answer = "Wir arbeiten hart daran, Video Download Helper für unsere Nutzer sicher zu halten: verfügbar in den offiziellen Browser-Stores (Chrome Web Store, Firefox Add-ons), wird von Millionen Nutzern weltweit verwendet, keine Spyware, kein Verkauf von Daten, regelmäßig aktualisiert und gewartet. Video Download Helper wird seit fast 20 Jahren entwickelt und genutzt. Ihre Privatsphäre und Sicherheit haben höchste Priorität."
landing_faq_items_5_question = "Was enthält die kostenpflichtige Version?"
landing_faq_items_5_answer = "Die Premium-Lizenz schaltet die volle Leistung von Video Download Helper frei: Entfernung des Wasserzeichens bei Konvertierungen, unbegrenzte hochwertige Videokonvertierungen, schnellere Verarbeitung, erweiterte Download-Funktionen, Unterstützung der weiteren Entwicklung. Wenn Sie regelmäßig Videos herunterladen, lohnt sich die Lizenz schnell."

