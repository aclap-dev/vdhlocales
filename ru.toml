landing_faq_items_0_question = '''Что такое Video Download Helper?'''
landing_faq_items_0_answer = '''Video Download Helper — это расширение браузера, которое позволяет обнаруживать и загружать видео и аудио со многих сайтов прямо из браузера.'''
landing_faq_items_1_question = '''Video Download Helper бесплатный?'''
landing_faq_items_1_answer = '''Да, и останется бесплатным. Вы можете установить и использовать Video Download Helper бесплатно, без ограничений по времени. Бесплатная версия уже позволяет загружать видео с тысяч сайтов и использовать все основные функции. Для большинства пользователей бесплатной версии более чем достаточно для ежедневных загрузок. Если вам нужны расширенные функции и безлимитные загрузки, вы можете приобрести одноразовую лицензию Премиум.'''
landing_faq_items_2_question = '''В каких браузерах можно использовать Video Download Helper?'''
landing_faq_items_2_answer = '''Video Download Helper доступен для Google Chrome, Firefox и Microsoft Edge. Вы можете установить его напрямую из официальных магазинов браузеров. Если у вас есть лицензия Премиум, она работает во всех браузерах.'''
landing_faq_items_3_question = '''Какие типы видео можно загружать?'''
landing_faq_items_3_answer = '''Video Download Helper обнаруживает и загружает большинство видеоформатов веб: стандартные MP4-видео, потоковые форматы (HLS, DASH), встроенные видео на тысячах сайтов и аудиопотоки (MP3 и другие). Работает в социальных сетях, на образовательных сайтах, новостных сайтах, стриминговых сервисах и многих других платформах. Расширение автоматически обнаруживает доступные медиа при посещении страницы.'''
landing_faq_items_4_question = '''Безопасен ли Video Download Helper?'''
landing_faq_items_4_answer = '''Мы много работаем, чтобы Video Download Helper был безопасен для наших пользователей: доступен в официальных магазинах браузеров (Chrome Web Store, Firefox Add-ons), используется миллионами пользователей по всему миру, без шпионских модулей, без перепродажи данных, регулярно обновляется и поддерживается. Video Download Helper разрабатывается и пользуется доверием уже почти 20 лет. Ваша конфиденциальность и безопасность — наш приоритет.'''
landing_faq_items_5_question = '''Что включает платная версия?'''
landing_faq_items_5_answer = '''Лицензия Премиум открывает всю мощь Video Download Helper: удаляет водяной знак с конверсий, обеспечивает безлимитные конверсии видео высокого качества, более быструю обработку, расширенные функции загрузки, поддерживает продолжение разработки. Если вы регулярно загружаете видео, лицензия быстро окупается.'''
