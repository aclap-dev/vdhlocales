landing_faq_items_0_question = '''Video DownloadHelperとは？'''
landing_faq_items_0_answer = '''Video DownloadHelperは、多くのウェブサイトから動画や音声コンテンツをブラウザから直接検出・ダウンロードできるブラウザ拡張機能です。'''
landing_faq_items_1_question = '''Video DownloadHelperは無料ですか？'''
landing_faq_items_1_answer = '''はい、これからも無料のままです。Video DownloadHelperは無料で、時間制限なく使えます。無料版でもすでに何千ものサイトから動画をダウンロードでき、すべての主要機能を利用できます。ほとんどのユーザーにとって、無料版で日常のダウンロードには十分以上です。高度な機能や無制限ダウンロードが必要な場合は、一回限りのプレミアムライセンスを購入できます。'''
landing_faq_items_2_question = '''Video DownloadHelperはどのブラウザで使えますか？'''
landing_faq_items_2_answer = '''Video DownloadHelperはGoogle Chrome、Firefox、Microsoft Edgeで利用できます。公式ブラウザストアから直接インストールできます。プレミアムライセンスをお持ちの場合、すべてのブラウザで動作します。'''
landing_faq_items_3_question = '''どんな種類の動画をダウンロードできますか？'''
landing_faq_items_3_answer = '''Video DownloadHelperは、標準のMP4動画、ストリーミング形式（HLS、DASH）、何千ものサイトに埋め込まれた動画、音声ストリーム（MP3など）といった、ほとんどのウェブ動画形式を検出・ダウンロードします。SNS、教育サイト、ニュースサイト、ストリーミングサービスなど、多くのプラットフォームで動作します。ページを訪問すると、拡張機能は利用可能なメディアを自動的に検出します。'''
landing_faq_items_4_question = '''Video DownloadHelperは安全ですか？'''
landing_faq_items_4_answer = '''Video DownloadHelperをユーザーにとって安全にするため努力しています。公式ストア（Chrome Web Store、Firefox Add-ons）で配信、世界中で数百万人のユーザーが利用、スパイウェアなし、データの転売なし、定期的に更新・メンテナンス。Video DownloadHelperは20年近くにわたり信頼されてきました。プライバシーとセキュリティは最優先事項です。'''
landing_faq_items_5_question = '''有料版には何が含まれますか？'''
landing_faq_items_5_answer = '''プレミアムライセンスでVideo DownloadHelperの全機能を解放：変換時のウォーターマーク削除、無制限の高品質動画変換、高速処理、高度なダウンロード機能、継続的な開発のサポート。定期的に動画をダウンロードする方なら、ライセンスはすぐに元が取れます。'''

