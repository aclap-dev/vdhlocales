landing_faq_items_0_question = "Co to jest Video Download Helper?"
landing_faq_items_0_answer = "Video Download Helper to rozszerzenie przeglądarki, które pozwala wykrywać i pobierać treści wideo i audio z wielu stron bezpośrednio z przeglądarki."
landing_faq_items_1_question = "Czy Video Download Helper jest darmowy?"
landing_faq_items_1_answer = "Tak, i pozostanie darmowy. Możesz zainstalować i używać Video Download Helper bezpłatnie, bez limitu czasu. Wersja darmowa pozwala już pobierać wideo z tysięcy stron i korzystać ze wszystkich podstawowych funkcji. Dla większości użytkowników wersja darmowa jest więcej niż wystarczająca do codziennego użytku. Jeśli potrzebujesz zaawansowanych funkcji i nieograniczonego pobierania, możesz kupić jednorazową licencję Premium."
landing_faq_items_2_question = "Z których przeglądarek mogę korzystać z Video Download Helper?"
landing_faq_items_2_answer = "Video Download Helper jest dostępny dla Google Chrome, Firefoksa i Microsoft Edge. Możesz zainstalować go bezpośrednio z oficjalnych sklepów przeglądarek. Jeśli masz licencję Premium, działa ona we wszystkich przeglądarkach."
landing_faq_items_3_question = "Jakie rodzaje wideo mogę pobierać?"
landing_faq_items_3_answer = "Video Download Helper wykrywa i pobiera większość internetowych formatów wideo: standardowe wideo MP4, formaty streamingu (HLS, DASH), wideo osadzone na tysiącach stron oraz strumienie audio (MP3 i inne). Działa na portalach społecznościowych, stronach edukacyjnych, serwisach informacyjnych, usługach streamingowych i wielu innych platformach. Rozszerzenie automatycznie wykrywa dostępne media, gdy odwiedzasz stronę."
landing_faq_items_4_question = "Czy Video Download Helper jest bezpieczny?"
landing_faq_items_4_answer = "Dokładamy starań, aby Video Download Helper był bezpieczny dla naszych użytkowników: jest dostępny w oficjalnych sklepach przeglądarek (Chrome Web Store, Firefox Add-ons), używany przez miliony użytkowników na całym świecie, bez oprogramowania szpiegującego, bez sprzedaży danych, regularnie aktualizowany i utrzymywany. Video Download Helper jest rozwijany od prawie 20 lat. Twoja prywatność i bezpieczeństwo są priorytetem."
landing_faq_items_5_question = "Co zawiera wersja płatna?"
landing_faq_items_5_answer = "Licencja Premium odblokowuje pełną moc Video Download Helper: usuwa znak wodny z konwersji, umożliwia nieograniczone konwersje wideo wysokiej jakości, szybsze przetwarzanie i zaawansowane funkcje pobierania, a także wspiera dalszy rozwój. Jeśli pobierasz wideo regularnie, licencja szybko się zwraca."

