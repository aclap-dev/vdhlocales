landing_faq_items_0_question = "What is Video Download Helper?"
landing_faq_items_0_answer = "Video Download Helper is a browser extension that allows you to detect and download video and audio content from many websites directly from your browser."
landing_faq_items_1_question = "Is Video Download Helper free?"
landing_faq_items_1_answer = "Yes - and it will remain free. You can install and use Video Download Helper at no cost, with no time limit. The free version already allows you to download videos from thousands of websites and use all core features. For most users, the free version is more than enough for everyday downloads. If you need advanced features and unlimited downloads, you can purchase a one-time premium license."
landing_faq_items_2_question = "Which browsers can I use Video Download Helper on?"
landing_faq_items_2_answer = "Video Download Helper is available for Google Chrome, Firefox and Microsoft Edge. You can install it directly from the official browser stores. If you have a premium licence, your license works on all browsers."
landing_faq_items_3_question = "What types of videos can I download?"
landing_faq_items_3_answer = "Video Download Helper detects and downloads most web video formats, including standard MP4 videos, streaming formats (HLS, DASH), embedded videos on thousands of websites and audio streams (MP3 and more). It works on social media platforms, educational sites, news websites, streaming services, and many other platforms. The extension automatically detects available media when you visit a page."
landing_faq_items_4_question = "Is Video Download Helper safe?"
landing_faq_items_4_answer = "We work hard to make Video Download Helper safe for our users: available on official browser stores (Chrome Web Store, Firefox Add-ons), used by millions of users worldwide, no spyware, no data resale, regularly updated and maintained. Video Download Helper has been developed and trusted for almost 20 years. Your privacy and security are a priority."
landing_faq_items_5_question = "What does the paid version include?"
landing_faq_items_5_answer = "The premium license unlocks the full power of Video Download Helper: removes watermark from conversions, enables unlimited high-quality video conversions, faster processing, advanced download features, supports continued development. If you download videos regularly, the license quickly pays for itself."

