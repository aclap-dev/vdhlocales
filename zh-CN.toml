landing_faq_items_0_question = '''什么是 Video Download Helper？'''
landing_faq_items_0_answer = '''Video Download Helper 是一个浏览器扩展，允许您直接从浏览器检测并下载来自众多网站的视频和音频内容。'''
landing_faq_items_1_question = '''Video Download Helper 免费吗？'''
landing_faq_items_1_answer = '''是的，并且将一直免费。您可以免费安装和使用 Video Download Helper，没有时间限制。免费版已经允许您从数千个网站下载视频，并使用所有核心功能。对于大多数用户来说,免费版对日常下载已经绰绰有余。如果您需要高级功能和无限下载,可以购买一次性高级版许可证。'''
landing_faq_items_2_question = '''我可以在哪些浏览器上使用 Video Download Helper？'''
landing_faq_items_2_answer = '''Video Download Helper 适用于 Google Chrome、Firefox 和 Microsoft Edge。您可以直接从官方浏览器商店安装。如果您有高级版许可证，它将在所有浏览器中有效。'''
landing_faq_items_3_question = '''我可以下载哪些类型的视频？'''
landing_faq_items_3_answer = '''Video Download Helper 可以检测和下载大多数 Web 视频格式：标准 MP4 视频、流媒体格式（HLS、DASH）、数千个网站上的嵌入视频以及音频流（MP3 等）。它支持社交媒体、教育网站、新闻网站、流媒体服务等众多平台。当您访问页面时，扩展会自动检测可用媒体。'''
landing_faq_items_4_question = '''Video Download Helper 安全吗？'''
landing_faq_items_4_answer = '''我们努力让 Video Download Helper 对用户安全：在官方浏览器商店（Chrome Web Store、Firefox Add-ons）中提供，全球数百万用户使用，无间谍软件，无数据转售，定期更新和维护。Video Download Helper 已开发并受信赖近 20 年。您的隐私和安全是我们的首要任务。'''
landing_faq_items_5_question = '''付费版包含什么？'''
landing_faq_items_5_answer = '''高级版许可证解锁 Video Download Helper 的全部功能：移除转换中的水印，支持无限高质量视频转换，更快处理速度，高级下载功能，支持持续开发。如果您经常下载视频，许可证很快就能收回成本。'''

